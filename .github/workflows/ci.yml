name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: bun install --frozen-lockfile

      - name: Lint & type check
        run: bun run check

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Verify package contents
        run: npm pack --dry-run
